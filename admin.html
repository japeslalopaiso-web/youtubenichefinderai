<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin — YouTube Niche Finder AI</title>
<!-- Block search engines from indexing this page -->
<meta name="robots" content="noindex, nofollow"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f2f8;font-family:'Inter',sans-serif;min-height:100vh}

/* LOGIN SCREEN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:#fff;border:1px solid #dde1ea;border-radius:20px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.1);text-align:center}
.login-logo{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:24px}
.login-yt{background:#ff0000;color:#fff;font-size:14px;font-weight:800;padding:6px 10px;border-radius:7px}
.login-ai{background:linear-gradient(135deg,#1d4ed8,#6d28d9);color:#fff;font-size:10px;font-weight:800;padding:4px 8px;border-radius:5px}
.login-title{font-size:22px;font-weight:800;color:#0f0f1a;margin-bottom:6px}
.login-sub{font-size:13px;color:#6b7280;font-weight:600;margin-bottom:28px}
.login-input{width:100%;background:#f3f4f6;border:1.5px solid #dde1ea;border-radius:10px;padding:13px 16px;color:#0f0f1a;font-size:14px;font-family:'Inter',sans-serif;font-weight:700;outline:none;transition:all 0.15s;margin-bottom:12px;text-align:center;letter-spacing:2px}
.login-input:focus{border-color:#1d4ed8;background:#fff;box-shadow:0 0 0 3px rgba(29,78,216,0.1)}
.login-btn{width:100%;padding:14px;border-radius:10px;border:none;background:linear-gradient(135deg,#1d4ed8,#6d28d9);color:#fff;font-size:15px;font-weight:800;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.18s;margin-top:4px}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(29,78,216,0.35)}
.login-error{background:#fee2e2;border:1px solid #fca5a5;color:#7f1d1d;border-radius:8px;padding:10px;font-size:13px;font-weight:700;margin-top:12px;display:none}
.login-attempts{font-size:12px;color:#9ca3af;font-weight:600;margin-top:10px}

/* ADMIN PANEL */
#admin-screen{display:none}
.admin-header{background:#fff;border-bottom:1px solid #dde1ea;padding:14px 32px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10}
.admin-logo{display:flex;align-items:center;gap:8px}
.a-yt{background:#ff0000;color:#fff;font-size:11px;font-weight:800;padding:4px 7px;border-radius:5px}
.a-ai{background:linear-gradient(135deg,#1d4ed8,#6d28d9);color:#fff;font-size:9px;font-weight:800;padding:3px 6px;border-radius:4px}
.admin-title{font-size:16px;font-weight:800;color:#0f0f1a}
.logout-btn{margin-left:auto;background:#fee2e2;border:1px solid #fca5a5;color:#7f1d1d;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif}
.admin-wrap{max-width:820px;margin:0 auto;padding:32px 24px}
.admin-tabs{display:flex;gap:8px;margin-bottom:20px}
.admin-tab{padding:9px 18px;border-radius:8px;border:1.5px solid #dde1ea;background:#fff;color:#374151;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.15s;font-family:'Inter',sans-serif}
.admin-tab.active{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.alert{padding:12px 16px;border-radius:10px;font-size:13.5px;margin-bottom:14px;font-weight:700;display:flex;align-items:center;gap:7px}
.alert.s{background:#dcfce7;border:1px solid #86efac;color:#14532d}
.alert.e{background:#fee2e2;border:1px solid #fca5a5;color:#7f1d1d}
.form-card{background:#fff;border:1px solid #dde1ea;border-radius:14px;padding:26px;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.fc-title{font-size:15px;font-weight:800;color:#0f0f1a;margin-bottom:18px;display:flex;align-items:center;gap:7px}
.autofill-row{background:#fff8f8;border:1.5px solid #fca5a5;border-radius:10px;padding:14px 16px;margin-bottom:18px;display:flex;flex-direction:column;gap:10px}
.autofill-label{font-size:12px;font-weight:800;color:#7f1d1d;text-transform:uppercase;letter-spacing:0.5px}
.autofill-input-row{display:flex;gap:8px}
.autofill-input{flex:1;background:#fff;border:1.5px solid #fca5a5;border-radius:8px;padding:9px 12px;color:#0f0f1a;font-size:13.5px;font-family:'Inter',sans-serif;font-weight:700;outline:none}
.autofill-btn{background:#ff0000;color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap}
.autofill-btn:disabled{opacity:0.5;cursor:not-allowed}
.autofill-status{font-size:12.5px;font-weight:700;padding:6px 10px;border-radius:7px}
.autofill-status.ok{background:#dcfce7;color:#14532d}
.autofill-status.err{background:#fee2e2;color:#7f1d1d}
.autofill-status.loading{background:#fef9c3;color:#713f12}
.fg-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg.full{grid-column:1/-1}
.fg label{font-size:11px;color:#1f2937;font-weight:800;text-transform:uppercase;letter-spacing:0.5px}
.fg input,.fg select,.fg textarea{background:#f3f4f6;border:1.5px solid #dde1ea;border-radius:8px;padding:9px 12px;color:#0f0f1a;font-size:13.5px;font-family:'Inter',sans-serif;font-weight:700;outline:none;transition:all 0.15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#1d4ed8;background:#fff;box-shadow:0 0 0 3px rgba(29,78,216,0.1)}
.fg textarea{resize:vertical;min-height:72px}
.tog-row{display:flex;gap:7px}
.tog{flex:1;padding:9px 8px;border-radius:8px;border:1.5px solid #dde1ea;background:#f3f4f6;color:#374151;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;transition:all 0.15s;text-align:center}
.tog.yes{background:#dcfce7;border-color:#86efac;color:#14532d}
.tog.no{background:#fee2e2;border-color:#fca5a5;color:#7f1d1d}
.score-wrap{display:flex;align-items:center;gap:12px}
.score-wrap input[type=range]{flex:1;accent-color:#1d4ed8}
.score-disp{width:38px;height:38px;border-radius:9px;background:linear-gradient(135deg,#1d4ed8,#6d28d9);color:#fff;font-size:15px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sub-btn{width:100%;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,#1d4ed8,#6d28d9);color:#fff;font-size:14px;font-weight:800;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.18s;margin-top:8px}
.sub-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(29,78,216,0.35)}
.sub-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.list-card{background:#fff;border:1px solid #dde1ea;border-radius:14px;padding:22px;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.list-title{font-size:15px;font-weight:800;color:#0f0f1a;margin-bottom:14px}
.nrow{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:9px;border:1px solid #eaecf0;margin-bottom:7px;background:#f9fafb}
.nrow-info{flex:1}
.nrow-name{font-size:13.5px;font-weight:800;color:#0f0f1a}
.nrow-meta{font-size:11.5px;color:#374151;margin-top:2px;font-weight:700}
.row-btns{display:flex;gap:6px}
.eb{background:#fef9c3;border:1px solid #fde047;color:#713f12;border-radius:7px;padding:6px 12px;cursor:pointer;font-size:12px;font-weight:800;font-family:'Inter',sans-serif}
.db{background:#fee2e2;border:1px solid #fca5a5;color:#7f1d1d;border-radius:7px;padding:6px 12px;cursor:pointer;font-size:12px;font-weight:800;font-family:'Inter',sans-serif}
.blog-editor-form{background:#fff;border:1px solid #dde1ea;border-radius:14px;padding:26px;margin-bottom:18px}
.rich-textarea{width:100%;background:#f3f4f6;border:1.5px solid #dde1ea;border-radius:8px;padding:12px 14px;color:#0f0f1a;font-size:14px;font-family:'Inter',sans-serif;font-weight:600;outline:none;resize:vertical;min-height:200px;line-height:1.7}
.pub-toggle{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#f3f4f6;border-radius:8px;cursor:pointer}
.pub-toggle input{accent-color:#1d4ed8;width:16px;height:16px}
.pub-toggle label{font-size:13.5px;font-weight:700;color:#0f0f1a;cursor:pointer}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.mbg.open{display:flex}
.modal{background:#fff;border:1px solid #dde1ea;border-radius:18px;padding:26px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.18)}
.modal-title{font-size:18px;font-weight:800;color:#0f0f1a;margin-bottom:18px}
.modal-actions{display:flex;gap:8px;margin-top:14px}
.modal-actions button{flex:1;padding:11px;border-radius:9px;border:1.5px solid #dde1ea;background:#f3f4f6;color:#374151;cursor:pointer;font-family:'Inter',sans-serif;font-size:13.5px;font-weight:700}
.modal-actions .sv{background:linear-gradient(135deg,#1d4ed8,#6d28d9);border-color:transparent;color:#fff}
.loading{text-align:center;padding:40px;color:#374151;font-size:14px;font-weight:700}
.spinner{width:28px;height:28px;border:3px solid #dde1ea;border-top-color:#1d4ed8;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <span class="login-yt">▶ YT</span>
      <span class="login-ai">AI</span>
    </div>
    <div class="login-title">🔒 Admin Access</div>
    <div class="login-sub">YouTube Niche Finder AI — Private Area</div>
    <input type="password" class="login-input" id="pwd-input" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkLogin()"/>
    <button class="login-btn" onclick="checkLogin()">🔓 Login</button>
    <div class="login-error" id="login-error">❌ Wrong password. Access denied.</div>
    <div class="login-attempts" id="login-attempts"></div>
  </div>
</div>

<!-- ADMIN PANEL (hidden until login) -->
<div id="admin-screen">
  <div class="admin-header">
    <div class="admin-logo">
      <span class="a-yt">▶ YT</span>
      <span class="a-ai">AI</span>
    </div>
    <div class="admin-title">⚙️ Admin Panel</div>
    <button class="logout-btn" onclick="logout()">🚪 Logout</button>
  </div>
  <div class="admin-wrap">
    <div id="alert-box"></div>
    <div class="admin-tabs">
      <button class="admin-tab active" onclick="switchTab('niches',this)">🔍 Manage Niches</button>
      <button class="admin-tab" onclick="switchTab('blog',this)">📝 Blog Posts</button>
    </div>

    <!-- NICHES TAB -->
    <div id="tab-niches">
      <div class="form-card">
        <div class="fc-title">➕ Add New Niche</div>
        <div class="autofill-row">
          <div class="autofill-label">🔴 Auto-Fill from YouTube Link</div>
          <div class="autofill-input-row">
            <input type="text" class="autofill-input" id="autofill-url" placeholder="Paste YouTube channel URL"/>
            <button class="autofill-btn" onclick="autoFill()" id="autofill-btn">⚡ Auto-Fill</button>
          </div>
          <div id="autofill-status" style="display:none"></div>
          <div id="thumb-preview" style="display:none"></div>
          <input type="hidden" id="f-thumbnail"/>
        </div>
        <div class="fg-grid">
          <div class="fg"><label>Channel Name</label><input type="text" id="f-channel" placeholder="e.g. Financial Historian"/></div>
          <div class="fg"><label>Category</label><select id="f-category"><option value="">Select</option><option>Animal</option><option>Education</option><option>Gaming</option><option>Finance</option><option>Health</option><option>Technology</option><option>Food</option><option>Travel</option><option>Business</option><option>Entertainment</option><option>Other</option></select></div>
          <div class="fg full"><label>YouTube Channel Link</label><input type="text" id="f-ytlink" placeholder="https://youtube.com/@channelname"/></div>
          <div class="fg"><label>Subscribers</label><input type="text" id="f-subscribers" placeholder="e.g. 18,700"/></div>
          <div class="fg"><label>Monthly Views</label><input type="text" id="f-views" placeholder="e.g. 450,000"/></div>
          <div class="fg"><label>Channel Age</label><input type="text" id="f-age" placeholder="e.g. 5 months"/></div>
          <div class="fg"><label>RPM Estimate</label><input type="text" id="f-rpm" placeholder="e.g. $5.00"/></div>
          <div class="fg"><label>Difficulty</label><select id="f-difficulty"><option value="">Select</option><option>Easy</option><option>Medium</option><option>Hard</option></select></div>
          <div class="fg"><label>Copyright Risk</label><select id="f-copyright"><option value="">Select</option><option>Low</option><option>Medium</option><option>High</option></select></div>
          <div class="fg"><label>Saturation Level</label><select id="f-saturation"><option value="">Select</option><option>Low</option><option>Medium</option><option>High</option></select></div>
          <div class="fg"><label>⏱ Time to 1K Subs</label><input type="text" id="f-time1k" placeholder="e.g. ~3 months"/></div>
          <div class="fg"><label>📅 Post Frequency</label><input type="text" id="f-postfreq" placeholder="e.g. 2x per week"/></div>
          <div class="fg full"><label>💡 Content Ideas (comma separated)</label><input type="text" id="f-ideas" placeholder="e.g. Top 10 stocks, Crypto explained"/></div>
          <div class="fg full"><label>🤖 AI Stack (comma separated)</label><input type="text" id="f-aistack" placeholder="e.g. ChatGPT, ElevenLabs, CapCut"/></div>
          <div class="fg full"><label>📋 Video Creation Process (one per line)</label><textarea id="f-process" placeholder="Step 1: Research&#10;Step 2: Write script&#10;Step 3: Record voiceover"></textarea></div>
          <div class="fg full"><label>🎯 AI-Ability Score (1-10)</label>
            <div class="score-wrap"><input type="range" min="1" max="10" value="7" id="f-aiscore" oninput="document.getElementById('asd').textContent=this.value"/><div class="score-disp" id="asd">7</div></div>
          </div>
          <div class="fg"><label>Works Faceless?</label><div class="tog-row"><button class="tog" id="faceless-yes" onclick="setTog('faceless',true)">✅ Yes</button><button class="tog" id="faceless-no" onclick="setTog('faceless',false)">❌ No</button></div></div>
          <div class="fg"><label>Viral Outlier?</label><div class="tog-row"><button class="tog" id="viral-yes" onclick="setTog('viral',true)">🔥 Yes</button><button class="tog" id="viral-no" onclick="setTog('viral',false)">❌ No</button></div></div>
          <div class="fg full"><label>💡 Why Is This Niche Growing?</label><textarea id="f-why" placeholder="Explain why this niche is growing..."></textarea></div>
        </div>
        <button class="sub-btn" onclick="addNiche()" id="submit-btn">🚀 Add Niche to Website</button>
      </div>
      <div class="list-card">
        <div class="list-title">📋 All Niches — <span id="admin-count">0</span> total</div>
        <div id="admin-list"><div class="loading"><div class="spinner"></div>Loading...</div></div>
      </div>
    </div>

    <!-- BLOG TAB -->
    <div id="tab-blog" style="display:none">
      <div class="blog-editor-form">
        <div class="fc-title">✍️ Write New Blog Post</div>
        <div class="fg-grid">
          <div class="fg full"><label>Post Title</label><input type="text" id="b-title" placeholder="e.g. How This Faceless Finance Channel Makes $8K/Month"/></div>

          <div class="fg full"><label>Short Excerpt</label><input type="text" id="b-excerpt" placeholder="A brief 1-2 sentence summary..."/></div>
          <div class="fg"><label>Author Name</label><input type="text" id="b-author" placeholder="Niche Finder Team"/></div>
          <div class="fg"><label>Thumbnail Image URL</label><input type="text" id="b-thumbnail" placeholder="https://...image.jpg"/></div>
          <div class="fg full"><label>Content (HTML supported: &lt;h2&gt;, &lt;p&gt;, &lt;ul&gt;, &lt;li&gt;, &lt;strong&gt;)</label><textarea class="rich-textarea" id="b-content" placeholder="Write your full blog post here..."></textarea></div>
          <div class="fg full">
            <div class="pub-toggle" onclick="document.getElementById('b-published').checked=!document.getElementById('b-published').checked">
              <input type="checkbox" id="b-published"/>
              <label>✅ Publish immediately</label>
            </div>
          </div>
        </div>
        <button class="sub-btn" onclick="addBlogPost()" id="blog-submit-btn">📝 Publish Blog Post</button>
      </div>
      <div class="list-card">
        <div class="list-title">📋 All Blog Posts — <span id="blog-count">0</span> total</div>
        <div id="blog-list"><div class="loading"><div class="spinner"></div>Loading...</div></div>
      </div>
    </div>
  </div>
</div>

<!-- Edit Modal -->

      <div class="fg"><label>Channel Name</label><input type="text" id="e-channel"/></div>
      <div class="fg"><label>Category</label><select id="e-category"><option>Animal</option><option>Education</option><option>Gaming</option><option>Finance</option><option>Health</option><option>Technology</option><option>Food</option><option>Travel</option><option>Business</option><option>Entertainment</option><option>Other</option></select></div>
      <div class="fg full"><label>YouTube Channel Link</label><input type="text" id="e-ytlink"/></div>

      <div class="fg"><label>Subscribers</label><input type="text" id="e-subscribers"/></div>
      <div class="fg"><label>Monthly Views</label><input type="text" id="e-views"/></div>
      <div class="fg"><label>Channel Age</label><input type="text" id="e-age"/></div>
      <div class="fg"><label>RPM</label><input type="text" id="e-rpm"/></div>
      <div class="fg"><label>Difficulty</label><select id="e-difficulty"><option>Easy</option><option>Medium</option><option>Hard</option></select></div>
      <div class="fg"><label>Copyright Risk</label><select id="e-copyright"><option>Low</option><option>Medium</option><option>High</option></select></div>
      <div class="fg"><label>Saturation</label><select id="e-saturation"><option>Low</option><option>Medium</option><option>High</option></select></div>
      <div class="fg"><label>Time to 1K</label><input type="text" id="e-time1k"/></div>
      <div class="fg"><label>Post Frequency</label><input type="text" id="e-postfreq"/></div>
      <div class="fg full"><label>Content Ideas</label><input type="text" id="e-ideas"/></div>
      <div class="fg full"><label>AI Stack</label><input type="text" id="e-aistack"/></div>
      <div class="fg full"><label>Video Process</label><textarea id="e-process"></textarea></div>
      <div class="fg full"><label>AI-Ability Score</label><div class="score-wrap"><input type="range" min="1" max="10" value="7" id="e-aiscore" oninput="document.getElementById('easd').textContent=this.value"/><div class="score-disp" id="easd">7</div></div></div>
      <div class="fg full"><label>Why Growing?</label><textarea id="e-why"></textarea></div>
    </div>
    <div class="modal-actions">
      <button onclick="closeEdit()">Cancel</button>
      <button class="sv" onclick="saveEdit()">💾 Save Changes</button>
    </div>
  </div>
</div>

<script>
const SB_URL='https://lfusargqdlkggwqbdpnz.supabase.co';
const SB_KEY='sb_publishable_DdyJnamslWtE7B0bwR_J1A_k1m7ZDlw';
const YT_KEY='AIzaSyD1DfCMwiDfaWVP0ds__WI4vQmrx9Oaz70';
const ADMIN_PASSWORD='YTNicheAdmin2025!';
const {createClient}=supabase;
const db=createClient(SB_URL,SB_KEY);

let attempts=0,editingId=null,toggleState={faceless:null,viral:null};

// LOGIN
function checkLogin(){
  const pwd=document.getElementById('pwd-input').value;
  if(pwd===ADMIN_PASSWORD){
    sessionStorage.setItem('yt_admin_auth','true');
    document.getElementById('login-screen').style.display='none';
    document.getElementById('admin-screen').style.display='block';
    loadAdminList();
  } else {
    attempts++;
    document.getElementById('login-error').style.display='block';
    document.getElementById('login-attempts').textContent=`${attempts} failed attempt${attempts>1?'s':''}`;
    document.getElementById('pwd-input').value='';
    if(attempts>=5){
      document.getElementById('pwd-input').disabled=true;
      document.querySelector('.login-btn').disabled=true;
      document.getElementById('login-error').textContent='🚫 Too many failed attempts. Refresh the page to try again.';
    }
  }
}

function logout(){
  sessionStorage.removeItem('yt_admin_auth');
  location.reload();
}

// Check if already logged in this session
if(sessionStorage.getItem('yt_admin_auth')==='true'){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('admin-screen').style.display='block';
}

function switchTab(tab,btn){
  document.querySelectorAll('.admin-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-niches').style.display=tab==='niches'?'block':'none';
  document.getElementById('tab-blog').style.display=tab==='blog'?'block':'none';
  if(tab==='blog')loadBlogList();
  if(tab==='niches')loadAdminList();
}

// YT API
function parseYTUrl(url){
  const pp=[/youtube\.com\/@([^/?&]+)/,/youtube\.com\/channel\/([^/?&]+)/,/youtube\.com\/c\/([^/?&]+)/];
  for(const p of pp){const m=url.trim().match(p);if(m)return{type:url.includes('/channel/')?'id':'handle',value:m[1]};}
  return null;
}
async function getChData(url){
  const pr=parseYTUrl(url);if(!pr)return null;
  const apiUrl=pr.type==='id'
    ?`https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=${pr.value}&key=${YT_KEY}`
    :`https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&forHandle=@${pr.value}&key=${YT_KEY}`;
  const res=await fetch(apiUrl);const d=await res.json();
  if(!d.items||!d.items.length)return null;return d.items[0];
}
function calcAge(pub){
  const m=Math.floor((new Date()-new Date(pub))/(1000*60*60*24*30.44));
  if(m<1)return'< 1 month';if(m<12)return m+' month'+(m>1?'s':'');
  const y=Math.floor(m/12),r=m%12;return y+' year'+(y>1?'s':'')+(r?' '+r+' month'+(r>1?'s':''):'');
}
const fN=n=>{if(!n&&n!==0)return'?';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return String(n);};

async function autoFill(){
  const url=document.getElementById('autofill-url').value.trim();
  if(!url){showAS('Please paste a YouTube channel URL','err');return;}
  const btn=document.getElementById('autofill-btn');btn.disabled=true;btn.textContent='⏳ Loading...';
  showAS('Fetching from YouTube...','loading');
  try{
    const ch=await getChData(url);
    if(!ch){showAS('❌ Channel not found.','err');btn.disabled=false;btn.textContent='⚡ Auto-Fill';return;}
    const subs=parseInt(ch.statistics.subscriberCount||0);
    const views=parseInt(ch.statistics.viewCount||0);
    const thumb=ch.snippet.thumbnails?.high?.url||'';
    document.getElementById('f-channel').value=ch.snippet.title||'';
    document.getElementById('f-ytlink').value='https://youtube.com/@'+(ch.snippet.customUrl||ch.id).replace('@','');
    document.getElementById('f-subscribers').value=fN(subs);
    document.getElementById('f-views').value=fN(Math.round(views/12));
    document.getElementById('f-age').value=calcAge(ch.snippet.publishedAt);
    document.getElementById('f-thumbnail').value=thumb;
    if(thumb){document.getElementById('thumb-preview').innerHTML=`<img src="${thumb}" style="width:48px;height:48px;border-radius:50%;border:2px solid #86efac;object-fit:cover"/><span style="font-size:12px;color:#14532d;font-weight:700;margin-left:8px">✅ Logo fetched!</span>`;document.getElementById('thumb-preview').style.cssText='display:flex;align-items:center;margin-top:4px';}
    showAS('✅ Auto-filled! Complete remaining fields.','ok');
  }catch(e){showAS('❌ Error: '+e.message,'err');}
  btn.disabled=false;btn.textContent='⚡ Auto-Fill';
}
function showAS(msg,type){const el=document.getElementById('autofill-status');el.style.display='block';el.className='autofill-status '+type;el.textContent=msg;}

function setTog(field,val){
  toggleState[field]=val;
  document.getElementById(field+'-yes').className='tog'+(val?' yes':'');
  document.getElementById(field+'-no').className='tog'+(!val?' no':'');
}

async function addNiche(){
  const btn=document.getElementById('submit-btn');
  const channel=document.getElementById('f-channel').value.trim();
  const category=document.getElementById('f-category').value;
  if(!channel||!category){showAlert('Please fill in channel name and category.','e');return;}
  btn.disabled=true;btn.textContent='Adding...';
  const {error}=await db.from('niches').insert({
    channel_name:channel,category,
    yt_link:document.getElementById('f-ytlink').value.trim(),
    subscribers:document.getElementById('f-subscribers').value.trim(),
    weekly_views:document.getElementById('f-views').value.trim(),
    channel_age:document.getElementById('f-age').value.trim(),
    rpm:document.getElementById('f-rpm').value.trim(),
    difficulty:document.getElementById('f-difficulty').value,
    copyright_risk:document.getElementById('f-copyright').value,
    saturation:document.getElementById('f-saturation').value,
    time_to_1k:document.getElementById('f-time1k').value.trim(),
    post_frequency:document.getElementById('f-postfreq').value.trim(),
    content_ideas:document.getElementById('f-ideas').value.trim(),
    ai_stack:document.getElementById('f-aistack').value.trim(),
    video_process:document.getElementById('f-process').value.trim(),
    ai_score:parseInt(document.getElementById('f-aiscore').value),
    faceless:toggleState.faceless===true,
    viral_outlier:toggleState.viral===true,
    why_growing:document.getElementById('f-why').value.trim(),
    thumbnail_url:document.getElementById('f-thumbnail').value.trim(),
  });
  btn.disabled=false;btn.textContent='🚀 Add Niche to Website';
  if(error){showAlert('Error: '+error.message,'e');return;}
  showAlert('✅ Niche added!','s');
  ['f-channel','f-ytlink','f-subscribers','f-views','f-age','f-rpm','f-time1k','f-postfreq','f-ideas','f-aistack','f-process','f-why','f-thumbnail'].forEach(id=>document.getElementById(id).value='');
  ['f-category','f-difficulty','f-copyright','f-saturation'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-aiscore').value=7;document.getElementById('asd').textContent='7';
  document.getElementById('autofill-url').value='';document.getElementById('autofill-status').style.display='none';
  document.getElementById('thumb-preview').style.display='none';
  toggleState={faceless:null,viral:null};
  ['faceless-yes','faceless-no','viral-yes','viral-no'].forEach(id=>document.getElementById(id).className='tog');
  loadAdminList();
}

async function loadAdminList(){
  const {data}=await db.from('niches').select('*').order('created_at',{ascending:false});
  const list=data||[];document.getElementById('admin-count').textContent=list.length;
  document.getElementById('admin-list').innerHTML=list.length===0
    ?'<div style="color:#374151;font-size:13px;font-weight:700;text-align:center;padding:28px">No niches yet.</div>'
    :list.map(n=>`<div class="nrow">
        <div class="nrow-info"><div class="nrow-name">${n.channel_name}</div><div class="nrow-meta">${n.category} · ${n.weekly_views||'?'} views · AI: ${n.ai_score||'?'}/10 · ${n.difficulty||'?'}</div></div>
        <div class="row-btns">
          <button class="eb" onclick="openEdit(${n.id})">✏️ Edit</button>
          <button class="db" onclick="delNiche(${n.id})">🗑 Delete</button>
        </div>
      </div>`).join('');
}

async function openEdit(id){
  const {data}=await db.from('niches').select('*').eq('id',id).single();if(!data)return;
  editingId=id;
  const map={channel:'channel_name',ytlink:'yt_link',views:'weekly_views',age:'channel_age',time1k:'time_to_1k',postfreq:'post_frequency',ideas:'content_ideas',aistack:'ai_stack',process:'video_process',why:'why_growing',thumbnail:'thumbnail_url'};
  ['channel','ytlink','subscribers','views','age','rpm','time1k','postfreq','ideas','aistack','process','why','thumbnail'].forEach(f=>{const el=document.getElementById('e-'+f);if(el)el.value=data[map[f]||f]||'';});
  ['category','difficulty'].forEach(f=>{const el=document.getElementById('e-'+f);if(el)el.value=data[f]||'';});
  document.getElementById('e-copyright').value=data.copyright_risk||'Low';
  document.getElementById('e-saturation').value=data.saturation||'Low';
  document.getElementById('e-aiscore').value=data.ai_score||7;
  document.getElementById('easd').textContent=data.ai_score||7;
  document.getElementById('edit-modal').classList.add('open');
}
function closeEdit(){document.getElementById('edit-modal').classList.remove('open');editingId=null;}
async function saveEdit(){
  if(!editingId)return;
  const {error}=await db.from('niches').update({
    channel_name:document.getElementById('e-channel').value.trim(),
    category:document.getElementById('e-category').value,
    yt_link:document.getElementById('e-ytlink').value.trim(),
    thumbnail_url:document.getElementById('e-thumbnail').value.trim(),
    subscribers:document.getElementById('e-subscribers').value.trim(),
    weekly_views:document.getElementById('e-views').value.trim(),
    channel_age:document.getElementById('e-age').value.trim(),
    rpm:document.getElementById('e-rpm').value.trim(),
    difficulty:document.getElementById('e-difficulty').value,
    copyright_risk:document.getElementById('e-copyright').value,
    saturation:document.getElementById('e-saturation').value,
    time_to_1k:document.getElementById('e-time1k').value.trim(),
    post_frequency:document.getElementById('e-postfreq').value.trim(),
    content_ideas:document.getElementById('e-ideas').value.trim(),
    ai_stack:document.getElementById('e-aistack').value.trim(),
    video_process:document.getElementById('e-process').value.trim(),
    ai_score:parseInt(document.getElementById('e-aiscore').value),
    why_growing:document.getElementById('e-why').value.trim(),
  }).eq('id',editingId);
  if(error){alert('Error: '+error.message);return;}
  closeEdit();loadAdminList();showAlert('✅ Niche updated!','s');
}
async function delNiche(id){if(!confirm('Delete this niche?'))return;await db.from('niches').delete().eq('id',id);loadAdminList();}

// BLOG
async function addBlogPost(){
  const btn=document.getElementById('blog-submit-btn');
  const title=document.getElementById('b-title').value.trim();
  const content=document.getElementById('b-content').value.trim();
  if(!title||!content){showAlert('Please fill in title and content.','e');return;}
  btn.disabled=true;btn.textContent='Publishing...';
  const sl=document.getElementById('b-slug').value.trim()||title.toLowerCase().replace(/[^a-z0-9]+/g,'-');
  const {error}=await db.from('blog_posts').insert({
    title,slug:sl,content,
    excerpt:document.getElementById('b-excerpt').value.trim(),
    author:document.getElementById('b-author').value.trim()||'Niche Finder Team',
    thumbnail_url:document.getElementById('b-thumbnail').value.trim(),
    published:document.getElementById('b-published').checked,
  });
  btn.disabled=false;btn.textContent='📝 Publish Blog Post';
  if(error){showAlert('Error: '+error.message,'e');return;}
  showAlert('✅ Blog post published!','s');
  ['b-title','b-slug','b-excerpt','b-author','b-thumbnail','b-content'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('b-published').checked=false;
  loadBlogList();
}
async function loadBlogList(){
  const {data}=await db.from('blog_posts').select('*').order('created_at',{ascending:false});
  const list=data||[];document.getElementById('blog-count').textContent=list.length;
  document.getElementById('blog-list').innerHTML=list.length===0
    ?'<div style="color:#374151;font-size:13px;font-weight:700;text-align:center;padding:28px">No posts yet.</div>'
    :list.map(p=>`<div class="nrow">
        <div class="nrow-info"><div class="nrow-name">${p.title}</div><div class="nrow-meta">${p.published?'✅ Published':'⏸ Draft'} · ${new Date(p.created_at).toLocaleDateString()}</div></div>
        <div class="row-btns">
          <button class="eb" onclick="togglePub(${p.id},${p.published})">${p.published?'⏸ Unpublish':'✅ Publish'}</button>
          <button class="db" onclick="delBlog(${p.id})">🗑 Delete</button>
        </div>
      </div>`).join('');
}
async function togglePub(id,cur){await db.from('blog_posts').update({published:!cur}).eq('id',id);loadBlogList();}
async function delBlog(id){if(!confirm('Delete?'))return;await db.from('blog_posts').delete().eq('id',id);loadBlogList();}

function showAlert(msg,type){
  const box=document.getElementById('alert-box');
  box.innerHTML=`<div class="alert ${type}">${msg}</div>`;
  setTimeout(()=>box.innerHTML='',4000);
}

// Load list if already logged in
if(sessionStorage.getItem('yt_admin_auth')==='true') loadAdminList();
</script>
